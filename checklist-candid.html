<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><meta name="robots" content="noindex,nofollow">
<title>TOTW — Candid Shot Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Spline+Sans+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--paper:#F2F1ED;--ink:#1B1A17;--soft:#6E6A61;--line:#D9D6CE;--red:#B5392A;--redsoft:#F3DEDA;--leaf:#3E5C44;--leafsoft:#E4EAE2;--card:#FAFAF7;--display:'Cormorant Garamond',Georgia,serif;--body:'Inter',sans-serif;--mono:'Spline Sans Mono',monospace}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--paper);color:var(--ink);font:15px/1.5 var(--body);padding-bottom:60px}.wrap{max-width:540px;margin:auto;padding:0 18px}header{padding:30px 0 18px;border-bottom:1px solid var(--ink);margin-bottom:20px}.eyebrow,label,.count,.board-k,footer{font-family:var(--mono);text-transform:uppercase;letter-spacing:.14em}.eyebrow{font-size:10px;color:var(--soft)}h1{font:500 clamp(30px,8vw,42px)/1.04 var(--display);margin-top:8px}h1 em{color:var(--red)}.pill{display:inline-block;margin-top:12px;padding:5px 12px;border-radius:99px;background:var(--ink);color:var(--paper);font:10px var(--mono);letter-spacing:.14em;text-transform:uppercase}.field{margin-bottom:15px}label{display:block;font-size:9.5px;color:#918D84;margin-bottom:5px}input,select{width:100%;padding:12px;border:1px solid var(--line);border-radius:7px;background:var(--card);font:15px var(--body);color:var(--ink)}.row{display:flex;gap:10px}.row .field{flex:1}.hint{font-size:12px;color:var(--soft)}.event-note{display:none;background:#EEEAE1;border:1px solid var(--line);padding:10px 12px;border-radius:7px;margin:-4px 0 15px;font-size:12.5px;color:var(--soft)}.boards{display:none;margin:4px 0 18px}.board{display:flex;justify-content:space-between;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:13px 14px;margin-bottom:8px}.board-k{font-size:9px;color:#918D84}.board-n{font:600 20px/1.15 var(--display);margin-top:2px}.board a{flex:none;text-decoration:none;background:var(--ink);color:var(--paper);padding:8px 10px;border-radius:6px;font:9.5px var(--mono);letter-spacing:.1em;text-transform:uppercase}.sec{font:600 24px var(--display);margin:26px 0 4px}.count{font-size:10px;color:var(--soft);margin-bottom:10px}.count b{color:var(--red)}.shot{display:flex;gap:12px;padding:13px 12px;background:var(--card);border:1px solid var(--line);border-radius:8px;margin-bottom:8px;cursor:pointer}.shot.on{background:var(--leafsoft);border-color:var(--leaf)}.box{width:22px;height:22px;border:2px solid var(--line);border-radius:5px;background:white;flex:none;position:relative}.shot.on .box{background:var(--leaf);border-color:var(--leaf)}.shot.on .box:after{content:'';position:absolute;left:6px;top:2px;width:5px;height:10px;border:solid white;border-width:0 2.5px 2.5px 0;transform:rotate(45deg)}.shot.on .txt{color:var(--leaf)}button{width:100%;padding:15px;border:0;border-radius:8px;background:var(--ink);color:var(--paper);font:12px var(--mono);letter-spacing:.14em;text-transform:uppercase;margin-top:22px}.err{display:none;background:var(--redsoft);color:var(--red);border:1px solid #D8A79E;border-radius:8px;padding:11px 13px;margin-top:14px}.err.show{display:block}#done{display:none;text-align:center;padding:70px 0}#done h2{font:500 34px var(--display)}footer{margin-top:44px;text-align:center;font-size:9px;color:#918D84}@media(max-width:420px){.row{display:block}}
</style></head><body><div class="wrap"><header><div class="eyebrow">Tale of Two Weddings</div><h1>Shot <em>Checklist</em></h1><div class="pill">Candid Team</div></header>
<div id="form"><div class="field"><label>Couple / client</label><select id="client"><option value="">Loading weddings…</option></select></div><div class="field" id="other" style="display:none"><label>Type couple's name</label><input id="otherName" placeholder="e.g. Ananya & Rohit"></div>
<div class="field"><label>Event type</label><select id="type"><option value="">Select the event…</option><option>Bride Making</option><option>Groom Making</option><option>Haldi</option><option>Pellikuthuru</option><option>Mehndi</option><option>Sangeet</option><option>Cocktail</option><option>Edurukollu</option><option value="Ceremony">Wedding Ceremony</option><option>Reception</option></select></div>
<div class="field"><label>Event date</label><input id="date" type="date"></div><div class="event-note" id="eventNote"></div><div class="field"><label>Your name</label><input id="crew" placeholder="Who is filling this in"></div><div class="row"><div class="field"><label>Check-in / start time</label><input id="start" type="time"></div><div class="field"><label>Check-out / close time</label><input id="end" type="time"></div></div>
<div class="boards" id="boards"></div><div id="shots" style="display:none"><div class="sec" id="title"></div><div class="count"><b id="doneCount">0</b> of <span id="allCount">0</span> ticked</div><div id="list"></div></div><div class="err" id="err"></div><button id="submit">Submit this event checklist</button><p class="hint" style="text-align:center;margin-top:12px">Each event is submitted separately, even when two events belong to the same couple on the same date.</p></div>
<div id="done"><h2>Submitted</h2><p id="doneText"></p></div><footer>TOTW · Shot Checklist · Candid</footer></div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script><script>
const TEAM='candid';const FIREBASE={apiKey:'AIzaSyCV14o1M9eUANLRxG_JrDZH2aGfqY3kjA4',authDomain:'tot-ledger.firebaseapp.com',databaseURL:'https://tot-ledger-default-rtdb.asia-southeast1.firebasedatabase.app',projectId:'tot-ledger',storageBucket:'tot-ledger.firebasestorage.app',messagingSenderId:'595678125258',appId:'1:595678125258:web:01fef3d4661b6f52346833'};
const FALLBACK={making:['Room and decor before preparations begin','Details: attire, jewellery, shoes and accessories','Hair and makeup progression','Immediate family reactions','Final reveal and portraits'],haldi:['Decor and setup before guests arrive','Ceremonial details and family rituals','Haldi application from both families','Reactions, laughter and candid interactions','Couple and family portraits'],mehndi:['Mehendi details and artist at work','Bride portraits with finished mehendi','Family and friends participating','Decor, food and atmosphere','Candid conversations and reactions'],sangeet:['Stage and decor wide shots','Couple and family entries','All planned performances','Audience reactions','Dance floor and after-party moments'],ceremony:['Mandap and ritual details','Bride and groom entries','Key rituals in sequence','Parents and family reactions','Couple and full-family portraits'],reception:['Stage and decor before guests arrive','Couple entry','Formal family groups','Guest interactions and candid reactions','Closing portraits and farewell moments']};
let db,lists={},coupleBoards={},eventBoards={},items=[];const $=id=>document.getElementById(id);const safe=s=>String(s||'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));const key=s=>String(s||'').trim().toLowerCase().replace(/[.#$\[\]\/]/g,'_');
const eventKey=t=>({'Bride Making':'making','Groom Making':'making','Haldi':'haldi','Pellikuthuru':'haldi','Mehndi':'mehndi','Sangeet':'sangeet','Cocktail':'sangeet','Edurukollu':'ceremony','Ceremony':'ceremony','Reception':'reception'})[t]||key(t);
const boardKey=t=>({'Bride Making':'bride-making','Groom Making':'groom-making','Haldi':'haldi','Pellikuthuru':'haldi','Mehndi':'mehndi','Sangeet':'sangeet-cocktail','Cocktail':'sangeet-cocktail','Edurukollu':'wedding','Ceremony':'wedding','Reception':'reception'})[t]||'';
const labels={'bride-making':'Bride Making','groom-making':'Groom Making',haldi:'Haldi & Pellikuthuru',mehndi:'Mehendi','sangeet-cocktail':'Sangeet & Cocktail',wedding:'Wedding & Rituals',reception:'Reception'};
function clientName(){return $('client').value==='__other__'?$('otherName').value.trim():$('client').value}function eventId(){return key(clientName()+'|'+$('date').value+'|'+$('type').value)}
async function init(){ $('date').value=new Date().toISOString().slice(0,10);firebase.initializeApp(FIREBASE);db=firebase.database();const vals=await Promise.all(['bookings','enquiries','shotLists','shotMoods','shotEventMoods'].map(n=>db.ref(n).once('value').then(s=>s.val()||{}).catch(()=>({}))));lists=vals[2];coupleBoards=vals[3];eventBoards=vals[4];buildClients(vals[0],vals[1]);render()}
function buildClients(bookings,enquiries){const names=new Set();Object.values(bookings).forEach(x=>x&&x.c&&names.add(x.c));Object.values(enquiries).forEach(x=>x&&x.status==='BOOKED'&&x.name&&names.add(x.name));$('client').innerHTML='<option value="">Select the couple…</option>'+[...names].sort().map(n=>`<option value="${safe(n)}">${safe(n)}</option>`).join('')+'<option value="__other__">Not listed — type it in</option>'}
function render(){ $('other').style.display=$('client').value==='__other__'?'block':'none';const t=$('type').value,k=eventKey(t),remote=lists[k]&&lists[k][TEAM];const arr=Array.isArray(remote)&&remote.length?remote:(remote&&typeof remote==='object'?Object.values(remote):(FALLBACK[k]||[]));items=arr.map(t=>({t,done:false}));$('title').textContent=t?t+' — shots to cover':'';$('list').innerHTML=items.map((x,i)=>`<div class="shot" id="s${i}" onclick="toggle(${i})"><span class="box"></span><span class="txt">${safe(x.t)}</span></div>`).join('');$('shots').style.display=t?'block':'none';renderBoards();updateCount();const c=clientName(),d=$('date').value;$('eventNote').style.display=c&&t&&d?'block':'none';$('eventNote').textContent=c&&t&&d?`${c} · ${t} · ${d}. This is a separate event record and will not merge with another event on the same date.`:''}
function renderBoards(){const cards=[],c=clientName(),t=$('type').value,bk=boardKey(t),cb=c&&coupleBoards[key(c)],eb=bk&&eventBoards[bk];if(cb&&cb.url)cards.push(['Couple-specific board',c,cb.url]);if(eb&&eb.url)cards.push(['Common event inspiration',labels[bk]||t,eb.url]);$('boards').innerHTML=cards.map(x=>`<div class="board"><div><div class="board-k">${safe(x[0])}</div><div class="board-n">${safe(x[1])}</div></div><a href="${safe(x[2])}" target="_blank" rel="noopener noreferrer">Open board</a></div>`).join('');$('boards').style.display=cards.length?'block':'none'}
function toggle(i){items[i].done=!items[i].done;$('s'+i).classList.toggle('on',items[i].done);updateCount()}function updateCount(){$('doneCount').textContent=items.filter(x=>x.done).length;$('allCount').textContent=items.length}
async function submit(){const c=clientName(),t=$('type').value,d=$('date').value,crew=$('crew').value.trim(),start=$('start').value,end=$('end').value,missing=[];if(!c)missing.push('couple');if(!t)missing.push('event type');if(!d)missing.push('event date');if(!crew)missing.push('your name');if(!start)missing.push('check-in time');if(!end)missing.push('check-out time');if(missing.length){$('err').textContent='Still needed: '+missing.join(', ')+'.';$('err').className='err show';return}$('submit').disabled=true;$('submit').textContent='Submitting…';try{await db.ref('shotChecklists').push({eventId:eventId(),eventInstanceKey:eventId(),client:c,eventType:t,eventDate:d,team:TEAM,crewName:crew,startTime:start,endTime:end,items:items.map(x=>({t:x.t,done:!!x.done})),tickedCount:items.filter(x=>x.done).length,totalCount:items.length,submittedAt:Date.now()});$('form').style.display='none';$('done').style.display='block';$('doneText').textContent=`${c} · ${t} · ${d} · ${items.filter(x=>x.done).length}/${items.length} shots ticked`;scrollTo(0,0)}catch(e){$('submit').disabled=false;$('submit').textContent='Submit this event checklist';$('err').textContent='Could not save. Check your network and try again.';$('err').className='err show'}}
['client','type','date'].forEach(id=>$(id).addEventListener('change',render));$('otherName').addEventListener('input',render);$('submit').addEventListener('click',submit);init();
</script></body></html>
