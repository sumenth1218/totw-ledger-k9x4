<body>
<header class="hero"><div class="brand"><img src="totw-logo-square.jpg?v=3" alt="Tale of Two Photos and Films"><span>Event details</span></div><div class="hero-copy"><div class="eyebrow">A smoother wedding-day experience</div><h1 id="heroTitle">Your celebration,<br>thoughtfully planned.</h1><p id="heroText">We have already added your events and dates. Please share the timings and locations so our team can arrive prepared and stay present for every moment.</p></div></header>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
const FIREBASE={apiKey:'AIzaSyCV14o1M9eUANLRxG_JrDZH2aGfqY3kjA4',authDomain:'tot-ledger.firebaseapp.com',databaseURL:'https://tot-ledger-default-rtdb.asia-southeast1.firebasedatabase.app',projectId:'tot-ledger',storageBucket:'tot-ledger.firebasestorage.app',messagingSenderId:'595678125258',appId:'1:595678125258:web:01fef3d4661b6f52346833'};
const token=new URLSearchParams(location.search).get('f')||'',MN=['January','February','March','April','May','June','July','August','September','October','November','December'];let db,form={},submission={},events=[],saveTimer=null,saving=false,currentContributor=null;
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtDate=iso=>{const[y,m,d]=String(iso).split('-').map(Number);return `${MN[m-1]} ${d}, ${y}`};const fmtTime=t=>{if(!t)return '';const[h,m]=t.split(':').map(Number),ap=h>=12?'PM':'AM';return `${h%12||12}:${String(m).padStart(2,'0')} ${ap}`};
function fail(msg){document.getElementById('app').innerHTML=`<div class="error">${esc(msg)}</div>`}
function contributorFromSession(){const id=sessionStorage.getItem('totwContributor_'+token);return id&&submission.contributors&&submission.contributors[id]?{id,...submission.contributors[id]}:null}
function contributorRoleLabel(role){return ({bride:'Bride',groom:'Groom',family:'Family member',planner:'Wedding planner'})[role]||'Contributor'}
function prettyUpdated(ts){if(!ts)return '';return new Date(ts).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'numeric',minute:'2-digit'})}
async function boot(){if(!token||token.length<16)return fail('This private link is incomplete. Please ask Tale of Two to send it again.');firebase.initializeApp(FIREBASE);db=firebase.database();try{const [a,b]=await Promise.all([db.ref('clientForms/'+token).once('value'),db.ref('clientSubmissions/'+token).once('value')]);form=a.val()||{};submission=b.val()||{};if(!form.couple||!form.events)return fail('This event-details link is no longer available. Please contact Tale of Two.');events=Object.entries(form.events).sort((x,y)=>(x[1].order||0)-(y[1].order||0));document.getElementById('heroTitle').innerHTML=`${esc(form.couple)},<br>your wedding details.`;document.getElementById('heroText').textContent='A few essentials to help our team arrive prepared and document every celebration seamlessly.';currentContributor=contributorFromSession();(form.locked||form.open===false||currentContributor)?render():renderContact();}catch(e){fail('We could not open the form. Please check your connection and try again.')}}
function renderContact(){if(form.locked||form.open===false)return render();const c=currentContributor||submission.contact||{};document.getElementById('app').innerHTML=`<section class="contact-card"><div class="section-label">Your private wedding concierge</div><h2>Who is updating the details today?</h2><p>This private link can be completed by the bride, groom, a family member or your wedding planner at different times. We’ll keep each update clearly attributed.</p><div class="role-grid">${[['bride','Bride'],['groom','Groom'],['family','Family member'],['planner','Wedding planner']].map(([v,l])=>`<label class="role-option"><input type="radio" name="clientRole" value="${v}" ${c.role===v?'checked':''}><span>${l}</span></label>`).join('')}</div><div class="field"><label>Your full name</label><input id="clientFullName" autocomplete="name" value="${esc(c.fullName||'')}" placeholder="Full name"></div><div class="field"><label>Mobile number</label><input id="clientPhone" type="tel" inputmode="tel" autocomplete="tel" value="${esc(c.phone||'')}" placeholder="e.g. +91 98765 43210"></div><div class="field"><label>Email address</label><input id="clientEmail" type="email" inputmode="email" autocomplete="email" value="${esc(c.email||'')}" placeholder="name@email.com"></div><div class="contact-error" id="contactError"></div><button class="submit" id="contactContinue" onclick="saveContact()">Continue to wedding details</button><div class="privacy-note"><span>✦</span><p>These details are used only to plan and communicate about your celebration.</p></div></section>`;}
async function saveContact(){const name=document.getElementById('clientFullName').value.trim(),phone=document.getElementById('clientPhone').value.trim(),email=document.getElementById('clientEmail').value.trim(),role=document.querySelector('input[name="clientRole"]:checked')?.value||'',err=document.getElementById('contactError'),btn=document.getElementById('contactContinue'),digits=phone.replace(/\D/g,'');let msg='';if(!role)msg='Please select who is updating the details.';else if(name.length<2)msg='Please enter your full name.';else if(digits.length<7||digits.length>15)msg='Please enter a valid mobile number.';else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))msg='Please enter a valid email address.';if(msg){err.textContent=msg;err.classList.add('show');return}err.classList.remove('show');btn.disabled=true;btn.textContent='Saving…';const id=currentContributor?.id||db.ref(`clientSubmissions/${token}/contributors`).push().key,now=Date.now(),contact={fullName:name,phone,email,role},person={...contact,updatedAt:now};try{const updates={};updates[`clientSubmissions/${token}/contact`]=contact;updates[`clientSubmissions/${token}/contributors/${id}`]=person;updates[`clientSubmissions/${token}/updatedAt`]=now;updates[`clientSubmissions/${token}/updatedById`]=id;updates[`clientSubmissions/${token}/updatedByName`]=name;updates[`clientSubmissions/${token}/updatedByRole`]=role;await db.ref().update(updates);submission.contact=contact;submission.contributors={...(submission.contributors||{}),[id]:person};submission.updatedAt=now;submission.updatedById=id;submission.updatedByName=name;submission.updatedByRole=role;currentContributor={id,...person};sessionStorage.setItem('totwContributor_'+token,id);render();window.scrollTo({top:document.querySelector('.shell').offsetTop,behavior:'smooth'})}catch(e){err.textContent='We could not save your details. Please check your connection and try again.';err.classList.add('show');btn.disabled=false;btn.textContent='Continue to wedding details'}}
function switchContributor(){sessionStorage.removeItem('totwContributor_'+token);currentContributor=null;renderContact();window.scrollTo({top:document.querySelector('.shell').offsetTop,behavior:'smooth'})}
function value(id,key){return (((submission.events||{})[id]||{})[key]||'')}
function done(id){const x=(submission.events||{})[id]||{};return !!(x.startTime&&x.endTime&&x.venueName&&x.mapsUrl)}
function eventProgress(id){const x=(submission.events||{})[id]||{},n=['startTime','endTime','venueName','mapsUrl'].filter(k=>!!x[k]).length;return n===4?['Complete','complete']:n?['Partially updated','partial']:['Details awaited','']}
function ask(key,event){if(event&&event.questions)return event.questions[key]===true;return !form.questions||form.questions[key]!==false}
function approvedSummary(){const rows=events.map(([id,e])=>{const x=(submission.events||{})[id]||{};return `<div class="summary-event"><b>${esc(e.name)}</b><p>${esc(fmtDate(e.date))}${x.startTime?` · ${esc(fmtTime(x.startTime))}`:''}</p><p>${esc(x.venueName||'Details confirmed with Tale of Two')}${x.mapsUrl?` · <a href="${esc(x.mapsUrl)}" target="_blank" rel="noopener">Open Maps ↗</a>`:''}</p></div>`}).join('');return `<section class="success"><div class="mark">✓</div><h2>Wedding details confirmed.</h2><p>Your event information has been reviewed by Tale of Two. This is the latest confirmed summary for our coverage planning.</p><div class="summary-list">${rows}</div><p>If a plan changes, please contact us and we’ll reopen the private link for you.</p></section>`}
function render(){if(form.locked||form.open===false){document.getElementById('app').innerHTML=approvedSummary();return}if(!currentContributor)return renderContact();const complete=events.filter(([id])=>done(id)).length,pct=events.length?Math.round(complete/events.length*100):0,last=submission.updatedAt?`Last updated by ${esc(submission.updatedByName||currentContributor.fullName)} · ${esc(prettyUpdated(submission.updatedAt))}`:'Saved automatically';document.getElementById('app').innerHTML=`<section class="progress-card"><div class="progress-top"><span><b id="doneCount">${complete}</b> of ${events.length} events complete</span><span id="percent">${pct}%</span></div><div class="track"><i id="bar" style="width:${pct}%"></i></div><div class="save-state" id="saveState">${last}</div></section><div class="contributor-strip"><span>Updating as <b>${esc(currentContributor.fullName)}</b> · ${esc(contributorRoleLabel(currentContributor.role))}</span><button class="text-button" onclick="switchContributor()">Change person</button></div><section class="intro"><h2>Your wedding details</h2><p>Add whichever details are currently confirmed. Each event stays compact until you choose to open it.</p><div class="plans-note">Plans may evolve. You, your partner or planner can return to this private link and update the details until they are confirmed by Tale of Two.</div></section><section class="events">${events.map((x,i)=>eventCard(x[0],x[1],i)).join('')}</section><section class="finish"><h3>${complete===events.length?'Ready to save?':'Save what is ready'}</h3><p>${complete===events.length?'Review the details above.':'Every event does not need to be complete today.'} Others can use this same private link later to add their information.</p><button class="submit" id="submitBtn" onclick="submitForm()">${submission.submittedAt?'Save updated wedding details':'Save wedding details'}</button></section>`;}
function eventCard(id,e,i){
  const isDone=done(id),x=(submission.events||{})[id]||{},d=new Date(e.date+'T00:00:00'),[state,stateClass]=eventProgress(id);
  const optional=[
    ask('contact',e)?`<div class="two"><div class="field"><label>Contact person</label><input data-id="${id}" data-key="contactName" value="${esc(x.contactName||'')}" placeholder="Name" oninput="fieldChanged(this)"></div><div class="field"><label>Contact number</label><input type="tel" inputmode="tel" data-id="${id}" data-key="contactPhone" value="${esc(x.contactPhone||'')}" placeholder="10-digit number" oninput="fieldChanged(this)"></div></div><div class="quick"><button class="chip" onclick="copyContactToAll('${id}')">Use this contact for all events</button></div>`:'',
    ask('brideReady',e)?`<div class="field"><label>Bride getting-ready location</label><input data-id="${id}" data-key="brideReadyLocation" value="${esc(x.brideReadyLocation||'')}" placeholder="Same venue, hotel or address" oninput="fieldChanged(this)"></div>`:'',
    ask('groomReady',e)?`<div class="field"><label>Groom getting-ready location</label><input data-id="${id}" data-key="groomReadyLocation" value="${esc(x.groomReadyLocation||'')}" placeholder="Same venue, hotel or address" oninput="fieldChanged(this)"></div>`:'',
    ask('notes',e)?`<div class="field"><label>Important getting-ready note</label><textarea data-id="${id}" data-key="notes" placeholder="Anything our team should know while planning these moments" oninput="fieldChanged(this)">${esc(x.notes||'')}</textarea></div>`:''
  ].join('');
  return `<article class="event ${isDone?'done':''}" id="event_${id}"><button class="event-head" onclick="toggleEvent('${id}')"><span class="date-tile"><b>${d.getDate()}</b><small>${MN[d.getMonth()].slice(0,3)}</small></span><span><h3>${esc(e.name)}</h3><p>${esc(fmtDate(e.date))}</p><span class="event-badge ${stateClass}">${state}</span>${x.updatedAt?`<div class="updated-line">Updated by ${esc(x.updatedByName||'a contributor')} · ${esc(prettyUpdated(x.updatedAt))}</div>`:''}</span><span class="event-state">${isDone?'✓':'⌄'}</span></button><div class="event-body"><div class="section-label">Event essentials</div><div class="two"><div class="field"><label>Actual event start time</label><input type="time" data-id="${id}" data-key="startTime" value="${esc(x.startTime||'')}" onchange="fieldChanged(this)"><small class="time-note">Enter the actual function start time—not the crew arrival time. Our team will plan to arrive approximately 1 hour earlier.</small></div><div class="field"><label>Expected event end time</label><input type="time" data-id="${id}" data-key="endTime" value="${esc(x.endTime||'')}" onchange="fieldChanged(this)"></div></div><div class="field"><label>Venue name</label><input data-id="${id}" data-key="venueName" value="${esc(x.venueName||'')}" placeholder="e.g. Taj Krishna, Hyderabad" oninput="fieldChanged(this)"></div><div class="field"><label>Google Maps link</label><input type="url" inputmode="url" data-id="${id}" data-key="mapsUrl" value="${esc(x.mapsUrl||'')}" placeholder="Paste the venue link" oninput="fieldChanged(this)"><small>Open the venue in Google Maps → Share → Copy link.</small></div>${i?`<div class="quick"><button class="chip" onclick="sameVenue('${id}',${i})">Use previous event venue</button></div>`:''}${optional?`<details class="optional"><summary>Preparation moments</summary><p class="ready-note">We’re asking for these details specifically to plan and photograph the getting-ready moments smoothly.</p>${optional}</details>`:''}<button class="next" onclick="saveAndNext('${id}',${i})">Save & continue</button></div></article>`
}
function toggleEvent(id){document.getElementById('event_'+id).classList.toggle('open')}
function collect(id){const old={...((submission.events||{})[id]||{})};document.querySelectorAll(`[data-id="${id}"]`).forEach(el=>old[el.dataset.key]=el.value.trim());return old}
function fieldChanged(el){const id=el.dataset.id;submission.events=submission.events||{};submission.events[id]=collect(id);queueSave(id)}
function queueSave(id){saving=true;const st=document.getElementById('saveState');if(st)st.textContent='Saving…';clearTimeout(saveTimer);saveTimer=setTimeout(()=>saveEvent(id),450)}
async function saveEvent(id){const now=Date.now(),data={...collect(id),updatedAt:now,updatedById:currentContributor?.id||'',updatedByName:currentContributor?.fullName||'',updatedByRole:currentContributor?.role||''};submission.events=submission.events||{};submission.events[id]=data;submission.updatedAt=now;submission.updatedById=data.updatedById;submission.updatedByName=data.updatedByName;submission.updatedByRole=data.updatedByRole;try{const updates={};updates[`clientSubmissions/${token}/events/${id}`]=data;updates[`clientSubmissions/${token}/updatedAt`]=now;updates[`clientSubmissions/${token}/updatedById`]=data.updatedById;updates[`clientSubmissions/${token}/updatedByName`]=data.updatedByName;updates[`clientSubmissions/${token}/updatedByRole`]=data.updatedByRole;await db.ref().update(updates);saving=false;updateProgress();const st=document.getElementById('saveState');if(st)st.textContent=`Saved · ${prettyUpdated(now)}`}catch(e){const st=document.getElementById('saveState');if(st){st.textContent='Not saved — check connection';st.style.color='#9d3629'}}}
function updateProgress(){const n=events.filter(([id])=>done(id)).length,p=events.length?Math.round(n/events.length*100):0;const b=document.getElementById('bar'),c=document.getElementById('doneCount'),q=document.getElementById('percent');if(b)b.style.width=p+'%';if(c)c.textContent=n;if(q)q.textContent=p+'%';events.forEach(([id])=>document.getElementById('event_'+id)?.classList.toggle('done',done(id)))}
async function saveAndNext(id,i){await saveEvent(id);const card=document.getElementById('event_'+id);card.classList.remove('open');if(i+1<events.length){const next=document.getElementById('event_'+events[i+1][0]);next.classList.add('open');next.scrollIntoView({behavior:'smooth',block:'start'})}else document.querySelector('.finish').scrollIntoView({behavior:'smooth',block:'center'})}
function sameVenue(id,i){const prev=events[i-1][0],a=collect(prev);document.querySelector(`[data-id="${id}"][data-key="venueName"]`).value=a.venueName||'';document.querySelector(`[data-id="${id}"][data-key="mapsUrl"]`).value=a.mapsUrl||'';submission.events=submission.events||{};submission.events[id]=collect(id);queueSave(id)}
async function copyContactToAll(id){const x=collect(id),updates={};events.forEach(([k])=>{submission.events=submission.events||{};submission.events[k]={...((submission.events||{})[k]||{}),contactName:x.contactName||'',contactPhone:x.contactPhone||''};updates[`clientSubmissions/${token}/events/${k}/contactName`]=x.contactName||'';updates[`clientSubmissions/${token}/events/${k}/contactPhone`]=x.contactPhone||'';const n=document.querySelector(`[data-id="${k}"][data-key="contactName"]`),p=document.querySelector(`[data-id="${k}"][data-key="contactPhone"]`);if(n)n.value=x.contactName||'';if(p)p.value=x.contactPhone||''});updates[`clientSubmissions/${token}/updatedAt`]=Date.now();const st=document.getElementById('saveState');if(st)st.textContent='Saving…';try{await db.ref().update(updates);if(st)st.textContent='Contact copied to all events'}catch(e){if(st)st.textContent='Not saved — check connection'}}
async function submitForm(){for(const[id]of events){submission.events=submission.events||{};const existing=submission.events[id]||{},collected=collect(id);submission.events[id]={...existing,...collected}}const btn=document.getElementById('submitBtn'),now=Date.now();btn.disabled=true;btn.textContent='Saving…';try{const updates={};updates[`clientSubmissions/${token}/contact`]=submission.contact;updates[`clientSubmissions/${token}/events`]=submission.events;updates[`clientSubmissions/${token}/updatedAt`]=now;updates[`clientSubmissions/${token}/submittedAt`]=now;updates[`clientSubmissions/${token}/updatedById`]=currentContributor?.id||'';updates[`clientSubmissions/${token}/updatedByName`]=currentContributor?.fullName||'';updates[`clientSubmissions/${token}/updatedByRole`]=currentContributor?.role||'';await db.ref().update(updates);submission={...submission,updatedAt:now,submittedAt:now,updatedById:currentContributor?.id||'',updatedByName:currentContributor?.fullName||'',updatedByRole:currentContributor?.role||''};const complete=events.filter(([id])=>done(id)).length;document.getElementById('app').innerHTML=`<section class="success"><div class="mark">✓</div><h2>Thank you, ${esc(currentContributor?.fullName||form.couple)}.</h2><p>Your wedding details have been saved securely. ${complete} of ${events.length} events are complete.</p><p>${esc(form.couple)}’s partner, family or planner can use this same private link to add the remaining information later.</p><button class="submit" onclick="continueEditing()">Continue adding details</button><button class="text-button" style="margin-top:18px" onclick="switchContributor()">Someone else is updating now</button></section>`;window.scrollTo({top:0,behavior:'smooth'})}catch(e){btn.disabled=false;btn.textContent='Save wedding details';alert('Your details could not be saved. Please check your connection and try again.')}}
function continueEditing(){render();window.scrollTo({top:document.querySelector('.shell').offsetTop,behavior:'smooth'})}
boot();
</script>
</body>
