:var(--green);margin-top:10px}.intro{padding:30px 3px 14px}.intro h2{font:600 32px/1 var(--serif)}.intro p{font-size:12.5px;color:var(--soft);line-height:1.65;margin-top:8px}.events{display:grid;gap:12px}.event{background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:0 8px 30px rgba(51,36,25,.045);overflow:hidden;animation:rise .45s ease both}.event-head{width:100%;border:0;background:transparent;padding:18px;text-align:left;display:grid;grid-template-columns:48px 1fr auto;gap:13px;align-items:center;cursor:pointer;color:var(--ink)}.date-tile{width:48px;height:52px;border-radius:12px;background:#f5ecdf;color:var(--wine);display:grid;place-content:center;text-align:center}.date-tile b{font:600 21px/1 var(--serif)}.date-tile small{font:500 7px var(--mono);letter-spacing:.11em;text-transform:uppercase;margin-top:3px}.event-head h3{font:600 25px/1 var(--serif)}.event-head p{font-size:10.5px;color:var(--soft);margin-top:4px}.event-state{width:25px;height:25px;border-radius:50%;border:1px solid var(--line);display:grid;place-content:center;font-size:11px;color:var(--soft);transition:.25s}.event.done .event-state{background:var(--green);border-color:var(--green);color:#fff}.event.open .event-state{transform:rotate(180deg)}.event-body{display:none;border-top:1px solid var(--line);padding:2px 18px 20px}.event.open .event-body{display:block;animation:fade .25s ease}.section-label{font:500 8px var(--mono);letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-top:18px}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{margin-top:12px}.field label{display:block;font:500 8px var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--soft);margin-bottom:6px}.field input,.field textarea{width:100%;border:1px solid var(--line);border-radius:12px;background:#fff;padding:13px 14px;color:var(--ink);font:400 14px var(--sans);outline:none;transition:.18s}.field textarea{min-height:86px;resize:vertical;line-height:1.5}.field input:focus,.field textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(167,122,50,.09)}.field small{display:block;font-size:10px;line-height:1.5;color:var(--soft);margin-top:5px}.quick{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 10px;font:500 8px var(--mono);letter-spacing:.06em;text-transform:uppercase;color:var(--soft);cursor:pointer}.optional{border-top:1px dashed var(--line);margin-top:18px;padding-top:15px}.optional summary{cursor:pointer;list-style:none;font:500 9px var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--wine)}.optional summary::-webkit-details-marker{display:none}.optional summary:after{content:' +';float:right}.optional[open] summary:after{content:' −'}.next{width:100%;border:0;border-radius:12px;background:var(--wine);color:#fff;padding:14px;margin-top:18px;font:500 9px var(--mono);letter-spacing:.12em;text-transform:uppercase;cursor:pointer}.finish{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:22px;margin-top:16px;text-align:center;box-shadow:var(--shadow)}.finish h3{font:600 29px/1 var(--serif)}.finish p{font-size:12px;color:var(--soft);line-height:1.6;margin:8px auto 16px;max-width:500px}.submit{width:100%;border:0;border-radius:13px;background:linear-gradient(135deg,var(--wine),var(--wine2));color:#fff;padding:16px;font:500 9px var(--mono);letter-spacing:.13em;text-transform:uppercase;cursor:pointer;box-shadow:0 12px 26px rgba(113,0,45,.2)}.submit:disabled{opacity:.4;box-shadow:none}.success{text-align:center;padding:68px 20px}.success .mark{width:66px;height:66px;border-radius:50%;background:#e7eee6;color:var(--green);display:grid;place-content:center;font-size:27px;margin:0 auto 18px}.success h2{font:600 40px/1 var(--serif)}.success p{font-size:13px;line-height:1.7;color:var(--soft);max-width:460px;margin:12px auto}.error{background:#f5e3df;color:#8c3226;border-radius:14px;padding:14px;font-size:12px;line-height:1.55;margin-top:16px}.loading{padding:90px 20px;text-align:center;color:var(--soft);font:500 9px var(--mono);letter-spacing:.14em;text-transform:uppercase}.locked{pointer-events:none;opacity:.72}@keyframes reveal{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}@keyframes rise{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}@keyframes fade{from{opacity:0}to{opacity:1}}@media(max-width:560px){.hero{padding-top:18px;padding-bottom:48px}.brand img{width:68px;height:68px}.hero-copy{margin-top:26px}.shell{padding-left:12px;padding-right:12px}.progress-card{border-radius:15px}.event-head{padding:15px;grid-template-columns:44px 1fr auto}.date-tile{width:44px;height:48px}.two{grid-template-columns:1fr}.event-body{padding:2px 15px 18px}}

@media(max-width:560px){.hero{padding:14px 14px 38px}.hero:after{width:260px;height:260px}.brand{gap:9px}.brand img{width:52px;height:52px}.brand span{font-size:7px;padding-left:9px}.hero-copy{margin-top:20px}.hero h1{font-size:34px}.hero p{font-size:11.5px;line-height:1.55;margin-top:11px}.shell{margin-top:-18px;padding:0 8px 50px}.progress-card{border-radius:13px;padding:13px 14px}.intro{padding:22px 4px 11px}.intro h2{font-size:28px}.intro p{font-size:11.5px}.events{gap:9px}.event{border-radius:14px}.event-head{padding:12px;grid-template-columns:38px minmax(0,1fr) 23px;gap:10px}.date-tile{width:38px;height:42px;border-radius:9px}.date-tile b{font-size:18px}.event-head h3{font-size:21px;overflow-wrap:anywhere}.event-head p{font-size:9.5px}.event-state{width:23px;height:23px}.event-body{padding:1px 12px 14px}.field{margin-top:10px}.field input,.field textarea{padding:11px 12px;border-radius:10px;font-size:13px;min-width:0}.field textarea{min-height:72px}.time-note,.ready-note{font-size:9.5px;padding:8px 9px}.optional{margin-top:14px;padding-top:12px}.next{padding:12px;margin-top:14px}.finish{border-radius:14px;padding:17px 14px}.finish h3{font-size:25px}.submit{padding:14px}.contact-card{border-radius:15px;padding:19px 15px}.contact-card h2{font-size:32px}.success{padding:48px 14px}.success h2{font-size:34px}}

<body>
<header class="hero"><div class="brand"><img src="totw-logo-square.jpg?v=3" alt="Tale of Two Photos and Films"><span>Event details</span></div><div class="hero-copy"><div class="eyebrow">A smoother wedding-day experience</div><h1 id="heroTitle">Your celebration,<br>thoughtfully planned.</h1><p id="heroText">We have already added your events and dates. Please share the timings and locations so our team can arrive prepared and stay present for every moment.</p></div></header>
<main class="shell"><div id="app"><div class="loading">Opening your private event form…</div></div></main>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
const FIREBASE={apiKey:'AIzaSyCV14o1M9eUANLRxG_JrDZH2aGfqY3kjA4',authDomain:'tot-ledger.firebaseapp.com',databaseURL:'https://tot-ledger-default-rtdb.asia-southeast1.firebasedatabase.app',projectId:'tot-ledger',storageBucket:'tot-ledger.firebasestorage.app',messagingSenderId:'595678125258',appId:'1:595678125258:web:01fef3d4661b6f52346833'};
const token=new URLSearchParams(location.search).get('f')||'',MN=['January','February','March','April','May','June','July','August','September','October','November','December'];let db,form={},submission={},events=[],saveTimer=null,saving=false;
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtDate=iso=>{const[y,m,d]=String(iso).split('-').map(Number);return `${MN[m-1]} ${d}, ${y}`};const fmtTime=t=>{if(!t)return '';const[h,m]=t.split(':').map(Number),ap=h>=12?'PM':'AM';return `${h%12||12}:${String(m).padStart(2,'0')} ${ap}`};
function fail(msg){document.getElementById('app').innerHTML=`<div class="error">${esc(msg)}</div>`}
function contactComplete(){const c=submission.contact||{};return !!(c.fullName&&c.phone&&c.email)}
async function boot(){if(!token||token.length<16)return fail('This private link is incomplete. Please ask Tale of Two to send it again.');firebase.initializeApp(FIREBASE);db=firebase.database();try{const [a,b]=await Promise.all([db.ref('clientForms/'+token).once('value'),db.ref('clientSubmissions/'+token).once('value')]);form=a.val()||{};submission=b.val()||{};if(!form.couple||!form.events)return fail('This event-details link is no longer available. Please contact Tale of Two.');events=Object.entries(form.events).sort((x,y)=>(x[1].order||0)-(y[1].order||0));document.getElementById('heroTitle').innerHTML=`${esc(form.couple)},<br>let’s plan beautifully.`;contactComplete()?render():renderContact();}catch(e){fail('We could not open the form. Please check your connection and try again.')}}
function renderContact(){if(form.locked||form.open===false)return render();const c=submission.contact||{};document.getElementById('app').innerHTML=`<section class="contact-card"><div class="section-label">Before we begin</div><h2>Welcome, ${esc(form.couple)}.</h2><p>Please share the contact details of the person completing this form. This helps our team reach the right person if any event information needs clarification.</p><div class="field"><label>Your full name</label><input id="clientFullName" autocomplete="name" value="${esc(c.fullName||'')}" placeholder="Full name"></div><div class="field"><label>Mobile number</label><input id="clientPhone" type="tel" inputmode="tel" autocomplete="tel" value="${esc(c.phone||'')}" placeholder="e.g. +91 98765 43210"></div><div class="field"><label>Email address</label><input id="clientEmail" type="email" inputmode="email" autocomplete="email" value="${esc(c.email||'')}" placeholder="name@email.com"></div><div class="contact-error" id="contactError"></div><button class="submit" id="contactContinue" onclick="saveContact()">Continue to event details</button><div class="privacy-note"><span>✦</span><p>These details are collected only for planning and communication related to your celebration.</p></div></section>`;}
async function saveContact(){const name=document.getElementById('clientFullName').value.trim(),phone=document.getElementById('clientPhone').value.trim(),email=document.getElementById('clientEmail').value.trim(),err=document.getElementById('contactError'),btn=document.getElementById('contactContinue'),digits=phone.replace(/\D/g,'');let msg='';if(name.length<2)msg='Please enter your full name.';else if(digits.length<7||digits.length>15)msg='Please enter a valid mobile number.';else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))msg='Please enter a valid email address.';if(msg){err.textContent=msg;err.classList.add('show');return}err.classList.remove('show');btn.disabled=true;btn.textContent='Saving…';const contact={fullName:name,phone,email};try{await db.ref(`clientSubmissions/${token}/contact`).set(contact);await db.ref(`clientSubmissions/${token}/updatedAt`).set(Date.now());submission.contact=contact;render();window.scrollTo({top:document.querySelector('.shell').offsetTop,behavior:'smooth'})}catch(e){err.textContent='We could not save your details. Please check your connection and try again.';err.classList.add('show');btn.disabled=false;btn.textContent='Continue to event details'}}
function value(id,key){return (((submission.events||{})[id]||{})[key]||'')}
function done(id){const x=(submission.events||{})[id]||{};return !!(x.startTime&&x.endTime&&x.venueName&&x.mapsUrl)}
function ask(key,event){if(event&&event.questions)return event.questions[key]===true;return !form.questions||form.questions[key]!==false}
function render(){if(form.locked||form.open===false){document.getElementById('app').innerHTML=`<section class="success"><div class="mark">✓</div><h2>Details received.</h2><p>Thank you, ${esc(form.couple)}. Your event information has been reviewed and added to our planning. If anything changes, please contact us directly.</p></section>`;return}const complete=events.filter(([id])=>done(id)).length,pct=events.length?Math.round(complete/events.length*100):0;document.getElementById('app').innerHTML=`<section class="progress-card"><div class="progress-top"><span><b id="doneCount">${complete}</b> of ${events.length} events complete</span><span id="percent">${pct}%</span></div><div class="track"><i id="bar" style="width:${pct}%"></i></div><div class="save-state" id="saveState">Saved automatically</div></section><section class="intro"><h2>Event details</h2><p>Add whichever details are currently confirmed. Bride and groom can return to this same link separately and complete their own locations before the studio approves it.</p><button class="edit-contact" onclick="renderContact()">Edit contact details</button></section><section class="events">${events.map((x,i)=>eventCard(x[0],x[1],i)).join('')}</section><section class="finish"><h3>${complete===events.length?'Ready to send?':'Send what is ready'}</h3><p>${complete===events.length?'Review the details above.':'You do not need to complete every event now.'} You can return and add or change information until our studio approves it.</p><button class="submit" id="submitBtn" onclick="submitForm()">${submission.submittedAt?'Send updated details':'Submit available details'} to Tale of Two</button></section>`;}
function eventCard(id,e,i){
  const isDone=done(id),x=(submission.events||{})[id]||{},d=new Date(e.date+'T00:00:00');
  const optional=[
    ask('contact',e)?`<div class="two"><div class="field"><label>Contact person</label><input data-id="${id}" data-key="contactName" value="${esc(x.contactName||'')}" placeholder="Name" oninput="fieldChanged(this)"></div><div class="field"><label>Contact number</label><input type="tel" inputmode="tel" data-id="${id}" data-key="contactPhone" value="${esc(x.contactPhone||'')}" placeholder="10-digit number" oninput="fieldChanged(this)"></div></div><div class="quick"><button class="chip" onclick="copyContactToAll('${id}')">Use this contact for all events</button></div>`:'',
    ask('brideReady',e)?`<div class="field"><label>Bride getting-ready location</label><input data-id="${id}" data-key="brideReadyLocation" value="${esc(x.brideReadyLocation||'')}" placeholder="Same venue, hotel or address" oninput="fieldChanged(this)"></div>`:'',
    ask('groomReady',e)?`<div class="field"><label>Groom getting-ready location</label><input data-id="${id}" data-key="groomReadyLocation" value="${esc(x.groomReadyLocation||'')}" placeholder="Same venue, hotel or address" oninput="fieldChanged(this)"></div>`:'',
    ask('notes',e)?`<div class="field"><label>Important getting-ready note</label><textarea data-id="${id}" data-key="notes" placeholder="Anything our team should know while planning these moments" oninput="fieldChanged(this)">${esc(x.notes||'')}</textarea></div>`:''
  ].join('');
  return `<article class="event ${isDone?'done':''} ${i===0&&!submission.submittedAt?'open':''}" id="event_${id}"><button class="event-head" onclick="toggleEvent('${id}')"><span class="date-tile"><b>${d.getDate()}</b><small>${MN[d.getMonth()].slice(0,3)}</small></span><span><h3>${esc(e.name)}</h3><p>${esc(fmtDate(e.date))}${isDone?' · Complete':' · Add details'}</p></span><span class="event-state">${isDone?'✓':'⌄'}</span></button><div class="event-body"><div class="section-label">Essentials</div><div class="two"><div class="field"><label>Event starts</label><input type="time" data-id="${id}" data-key="startTime" value="${esc(x.startTime||'')}" onchange="fieldChanged(this)"><small class="time-note">Please enter the actual event start time—not the crew arrival time. Our team will arrive approximately 1 hour earlier.</small></div><div class="field"><label>Event ends</label><input type="time" data-id="${id}" data-key="endTime" value="${esc(x.endTime||'')}" onchange="fieldChanged(this)"></div></div><div class="field"><label>Venue name</label><input data-id="${id}" data-key="venueName" value="${esc(x.venueName||'')}" placeholder="e.g. Taj Krishna, Hyderabad" oninput="fieldChanged(this)"></div><div class="field"><label>Google Maps link</label><input type="url" inputmode="url" data-id="${id}" data-key="mapsUrl" value="${esc(x.mapsUrl||'')}" placeholder="Paste the venue link" oninput="fieldChanged(this)"><small>Open the venue in Google Maps → Share → Copy link.</small></div>${i?`<div class="quick"><button class="chip" onclick="sameVenue('${id}',${i})">Same venue as previous event</button></div>`:''}${optional?`<details class="optional"><summary>Getting-ready details</summary><p class="ready-note">We’re asking for these details specifically to plan and photograph the getting-ready moments smoothly.</p>${optional}</details>`:''}<button class="next" onclick="saveAndNext('${id}',${i})">Save & continue</button></div></article>`
}
function toggleEvent(id){document.getElementById('event_'+id).classList.toggle('open')}
function collect(id){const old={...((submission.events||{})[id]||{})};document.querySelectorAll(`[data-id="${id}"]`).forEach(el=>old[el.dataset.key]=el.value.trim());return old}
function fieldChanged(el){const id=el.dataset.id;submission.events=submission.events||{};submission.events[id]=collect(id);queueSave(id)}
function queueSave(id){saving=true;const st=document.getElementById('saveState');if(st)st.textContent='Saving…';clearTimeout(saveTimer);saveTimer=setTimeout(()=>saveEvent(id),450)}
async function saveEvent(id){const data=collect(id);submission.events=submission.events||{};submission.events[id]=data;try{await db.ref(`clientSubmissions/${token}/events/${id}`).set(data);await db.ref(`clientSubmissions/${token}/updatedAt`).set(Date.now());saving=false;updateProgress();const st=document.getElementById('saveState');if(st)st.textContent='Saved automatically'}catch(e){const st=document.getElementById('saveState');if(st){st.textContent='Not saved — check connection';st.style.color='#9d3629'}}}
function updateProgress(){const n=events.filter(([id])=>done(id)).length,p=events.length?Math.round(n/events.length*100):0;const b=document.getElementById('bar'),c=document.getElementById('doneCount'),q=document.getElementById('percent');if(b)b.style.width=p+'%';if(c)c.textContent=n;if(q)q.textContent=p+'%';events.forEach(([id])=>document.getElementById('event_'+id)?.classList.toggle('done',done(id)))}
async function saveAndNext(id,i){await saveEvent(id);const card=document.getElementById('event_'+id);card.classList.remove('open');if(i+1<events.length){const next=document.getElementById('event_'+events[i+1][0]);next.classList.add('open');next.scrollIntoView({behavior:'smooth',block:'start'})}else document.querySelector('.finish').scrollIntoView({behavior:'smooth',block:'center'})}
function sameVenue(id,i){const prev=events[i-1][0],a=collect(prev);document.querySelector(`[data-id="${id}"][data-key="venueName"]`).value=a.venueName||'';document.querySelector(`[data-id="${id}"][data-key="mapsUrl"]`).value=a.mapsUrl||'';submission.events=submission.events||{};submission.events[id]=collect(id);queueSave(id)}
async function copyContactToAll(id){const x=collect(id),updates={};events.forEach(([k])=>{submission.events=submission.events||{};submission.events[k]={...((submission.events||{})[k]||{}),contactName:x.contactName||'',contactPhone:x.contactPhone||''};updates[`clientSubmissions/${token}/events/${k}/contactName`]=x.contactName||'';updates[`clientSubmissions/${token}/events/${k}/contactPhone`]=x.contactPhone||'';const n=document.querySelector(`[data-id="${k}"][data-key="contactName"]`),p=document.querySelector(`[data-id="${k}"][data-key="contactPhone"]`);if(n)n.value=x.contactName||'';if(p)p.value=x.contactPhone||''});updates[`clientSubmissions/${token}/updatedAt`]=Date.now();const st=document.getElementById('saveState');if(st)st.textContent='Saving…';try{await db.ref().update(updates);if(st)st.textContent='Contact copied to all events'}catch(e){if(st)st.textContent='Not saved — check connection'}}
async function submitForm(){for(const[id]of events){submission.events=submission.events||{};submission.events[id]=collect(id)}const btn=document.getElementById('submitBtn');btn.disabled=true;btn.textContent='Submitting…';try{const all={contact:submission.contact,events:submission.events,updatedAt:Date.now(),submittedAt:Date.now()};await db.ref('clientSubmissions/'+token).set(all);submission=all;const complete=events.filter(([id])=>done(id)).length;document.getElementById('app').innerHTML=`<section class="success"><div class="mark">✓</div><h2>Details saved.</h2><p>Thank you, ${esc(form.couple)}. We received ${complete} of ${events.length} complete event${events.length===1?'':'s'}. The same private link can be opened again by either of you to add locations or update anything until Tale of Two approves it.</p><button class="submit" onclick="continueEditing()">Continue adding details</button></section>`;window.scrollTo({top:0,behavior:'smooth'})}catch(e){btn.disabled=false;btn.textContent='Submit available details to Tale of Two';alert('Your details could not be submitted. Please check your connection and try again.')}}
function continueEditing(){render();window.scrollTo({top:document.querySelector('.shell').offsetTop,behavior:'smooth'})}
boot();
</script>
